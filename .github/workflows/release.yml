name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: |
          python -m pip install -U pip
          python -m pip install maturin build twine

      - name: Build wheels
        run: maturin build --release

      - name: Build source distribution
        run: python -m build --sdist

      - name: Check artifacts
        run: python -m twine check dist/* target/wheels/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cleanfig-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            dist/*
            target/wheels/*

      # For future trusted publishing, add a separate publish job using:
      # uses: pypa/gh-action-pypi-publish@release/v1
      # and configure PyPI Trusted Publishing outside the repository.
